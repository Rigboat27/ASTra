services:
  astra-agent:
    build: .
    container_name: astra-agent
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    stdin_open: true
    tty: true
    ports:
      - "5000:5000"
    networks:
      - agents-net

networks:
  agents-net:
    external: true
